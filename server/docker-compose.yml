# Brings up the whole Whiskey Vault backend with one command:
#   cd server && ADMIN_TOKEN=change-me docker compose up --build
#
# Each service is zero-dependency Node; data persists to ./data via JSONL files.
services:
  pricing:
    build: ./affiliate-price-service
    command: node index.js
    environment:
      - PORT=8787
    ports:
      - "8787:8787"
    restart: unless-stopped

  analytics:
    build: ./analytics-service
    command: node index.js
    environment:
      - PORT=8788
      - EVENTS_FILE=/data/events.jsonl
    volumes:
      - ./data:/data
    ports:
      - "8788:8788"
    restart: unless-stopped

  push:
    build: ./push-service
    command: node index.js
    environment:
      - PORT=8789
      - TOKENS_FILE=/data/tokens.jsonl
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
    volumes:
      - ./data:/data
    ports:
      - "8789:8789"
    restart: unless-stopped
