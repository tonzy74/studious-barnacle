# Brings up the whole Whiskey Vault backend with one command:
#   cd server && ADMIN_TOKEN=change-me docker compose up --build
#
# Each service is zero-dependency Node; data persists to ./data via JSONL files.
services:
  pricing:
    build: ./affiliate-price-service
    command: node index.js
    environment:
      - PORT=8787
    ports:
      - "8787:8787"
    restart: unless-stopped

  analytics:
    build: ./analytics-service
    command: node index.js
    environment:
      - PORT=8788
      - EVENTS_FILE=/data/events.jsonl
    volumes:
      - ./data:/data
    ports:
      - "8788:8788"
    restart: unless-stopped

  push:
    build: ./push-service
    command: node index.js
    environment:
      - PORT=8789
      - TOKENS_FILE=/data/tokens.jsonl
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
    volumes:
      - ./data:/data
    ports:
      - "8789:8789"
    restart: unless-stopped

  ai:
    build: ./ai-proxy
    command: node index.js
    environment:
      - PORT=8790
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APP_TOKEN=${AI_APP_TOKEN:-change-me}
      - FREE_MONTHLY_QUOTA=${FREE_MONTHLY_QUOTA:-15}
      - MAX_FREE_PER_DAY=${MAX_FREE_PER_DAY:-1000}
      - USAGE_FILE=/data/ai-usage.json
    volumes:
      - ./data:/data
    ports:
      - "8790:8790"
    restart: unless-stopped
