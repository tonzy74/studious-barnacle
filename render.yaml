services:
  - type: web
    name: jobpilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://jobpilot.onrender.com
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /api/health
    disk:
      name: jobpilot-data
      mountPath: /app/data
      sizeGB: 1
